services:
  # Servicio de caché Redis
  redis-cache:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    command: redis-server --maxmemory ${CACHE_SIZE:-200mb} --maxmemory-policy ${EVICTION_POLICY:-allkeys-lru}
    networks:
      - tarea_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Generador de Respuestas
  response-generator:
    build: ./Generador-respuestas
    container_name: response_generator
    ports:
      - "3001:3001"
    environment:
      - METRICS_URL=http://metric-service:4000
    volumes:
      - ./data:/app/data:ro
    networks:
      - tarea_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Sistema de Métricas
  metric-service:
    build: ./Metricas
    container_name: metrics_storage
    ports:
      - "4000:4000"
    environment:
      - REDIS_URL=redis://redis-cache:6379
    volumes:
      - ./metrics_data:/data
    depends_on:
      redis-cache:
        condition: service_healthy
    networks:
      - tarea_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Broker Local de Apache Kafka (KRaft)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" 
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - tarea_net
    healthcheck:
      test: ["CMD", "kafka-cluster", "cluster-id", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Generador de tráfico como productor con Kafka 
  generador-trafico:
    build: ./Generador-trafico
    container_name: traffic_generator
    environment:
      - KAFKA_BROKER=kafka:9092
      - TOPIC_PRINCIPAL=consultas-geoespaciales
      - TEST_DURATION=${TEST_DURATION:-60}
      - RPS=${RPS:-10}
      - DISTRIBUTION=${DISTRIBUTION:-zipf}
      - METRICS_URL=http://metric-service:4000
    depends_on:
      kafka:
        condition: service_healthy
      metric-service:
        condition: service_healthy
    networks:
      - tarea_net
    restart: "no"

  # Consumidores Kafka con soporte para Resiliencia (Tópicos de reintento y DLQ)
  consumidor-base:
    build: ./Servidor
    container_name: consumidor_base
    environment:
      - KAFKA_BROKER=kafka:9092
      - TOPIC_PRINCIPAL=consultas-geoespaciales
      # Añadimos los tópicos que usará la lógica de Ariel:
      - TOPIC_RETRY=consultas-geoespaciales-retry
      - TOPIC_DLQ=consultas-geoespaciales-dlq
      - MAX_RETRIES=3
      - GROUP_ID=grupo-consumidores-sd
      - REDIS_URL=redis://redis-cache:6379
      - RESPONSE_GENERATOR_URL=http://response-generator:3001
      - METRICS_URL=http://metric-service:4000
    depends_on:
      kafka:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      response-generator:
        condition: service_healthy
    networks:
      - tarea_net
    restart: unless-stopped

networks:
  tarea_net:
    driver: bridge